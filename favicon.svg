  <!-- Steam lines -->
  <path d="M24 22 Q26 18 24 14" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M32 22 Q34 18 32 14" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M40 22 Q42 18 40 14" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Coffee liquid -->
